version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: palm_mind_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: palm_mind_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_storage:/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: palm_mind_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  qdrant_storage:
  redis_storage:
  sqlserver_data: